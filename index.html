<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Captain Team Management</title>
  <meta name="description" content="Captain — team management for youth sports. Schedules, messages, RSVPs, carpools, and more." />
  <link rel="icon" type="image/png" href="/icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Arial, sans-serif;
      background: #0A0A0B;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #16181C;
      border: 1px solid #262A32;
      border-radius: 24px;
      padding: 44px 32px 36px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      background: #0057B8;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .icon-letter {
      font-size: 40px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }
    .app-name {
      font-size: 13px;
      font-weight: 700;
      color: #C7CFDA;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 12px;
      line-height: 1.25;
    }
    .subtitle {
      font-size: 15px;
      color: #C7CFDA;
      line-height: 1.55;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 8px;
    }
    .btn {
      display: block;
      background: #16181C;
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid #262A32;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .btn:hover { background: #1C1F24; border-color: #2F343D; }
    .btn-primary {
      background: #0057B8;
      border-color: #0057B8;
    }
    .btn-primary:hover { background: #004A9E; border-color: #004A9E; }
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #4B5565;
      line-height: 1.6;
    }
    .footer a { color: #6B7280; text-decoration: none; }
    .footer a:hover { color: #9CA3AF; }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon-wrap">
      <span class="icon-letter">C</span>
    </div>
    <p class="app-name">Captain</p>
    <h1>Team management for youth sports.</h1>
    <p class="subtitle">Schedules, messages, RSVPs, carpools, and team photos — all in one place. Built for coaches, players, and guardians.</p>

    <nav class="links">
      <a class="btn btn-primary" href="mailto:support@captainteammanagement.com">Contact Support</a>
      <a class="btn" href="/privacy">Privacy Policy</a>
      <a class="btn" href="/terms">Terms of Service</a>
    </nav>

    <p class="footer">
      Captain Team Management LLC<br />
      <a href="mailto:support@captainteammanagement.com">support@captainteammanagement.com</a>
    </p>
  </main>
</body>
</html>
